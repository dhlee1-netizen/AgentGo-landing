<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentGo Demo — AI 에이전트 체험</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1A56C8;--blue2:#2563EB;--navy:#0A1628;--ice:#E8F0FB;--slate:#64748B;--green:#059669;--white:#FFFFFF;--bg:#FAFBFC;--bg2:#F1F5F9;--border:#E2E8F0;--text:#1E293B;--text2:#475569}
html{font-size:16px}
body{font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;color:var(--text);background:var(--bg);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}

.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-logo{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:800;font-size:1.1rem;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:8px}
.topbar-logo svg{width:24px;height:24px}
.topbar-divider{width:1px;height:24px;background:var(--border)}
.topbar-title{font-size:.9rem;font-weight:600;color:var(--text2)}
.topbar-back{margin-left:auto;font-size:.8rem;color:var(--blue);text-decoration:none;font-weight:600}
.topbar-back:hover{text-decoration:underline}

.app{flex:1;display:flex;max-width:1200px;width:100%;margin:0 auto;overflow:hidden}

.sidebar{width:300px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:700;font-size:1rem;color:var(--navy);margin-bottom:4px}
.sidebar-header p{font-size:.8rem;color:var(--slate)}
.scenario-list{flex:1;overflow-y:auto;padding:12px}
.scenario-btn{width:100%;text-align:left;padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--white);cursor:pointer;margin-bottom:8px;transition:all .2s}
.scenario-btn:hover{border-color:rgba(26,86,200,0.3);background:var(--ice)}
.scenario-btn.active{border-color:var(--blue);background:var(--ice);box-shadow:0 0 0 2px rgba(26,86,200,0.15)}
.scenario-icon{font-size:1.4rem;margin-bottom:8px;display:block}
.scenario-btn h3{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:700;font-size:.9rem;color:var(--navy);margin-bottom:4px}
.scenario-btn p{font-size:.75rem;color:var(--slate);line-height:1.5}
.scenario-modules{display:flex;gap:4px;margin-top:8px}
.scenario-mod{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:100px;background:rgba(26,86,200,0.08);color:var(--blue)}

.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:16px 24px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-agent-icon{width:36px;height:36px;border-radius:10px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'SUIT Variable',SUIT,sans-serif;font-weight:800;font-size:.85rem;flex-shrink:0}
.chat-agent-info h3{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:700;font-size:.95rem;color:var(--navy)}
.chat-agent-info p{font-size:.75rem;color:var(--green);font-weight:500}

.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{align-self:flex-start}
.msg-user{align-self:flex-end}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:.9rem;line-height:1.65}
.msg-bot .msg-bubble{background:var(--white);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg-user .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-label{font-size:.7rem;color:var(--slate);margin-bottom:4px;font-weight:500}
.msg-bot .msg-label{padding-left:4px}
.msg-user .msg-label{text-align:right;padding-right:4px}

.msg-bubble table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.82rem}
.msg-bubble th{background:var(--ice);padding:8px 10px;text-align:left;font-weight:600;font-size:.78rem;color:var(--navy);border-bottom:1px solid var(--border)}
.msg-bubble td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.msg-bubble .status-ok{color:var(--green);font-weight:600}
.msg-bubble .status-warn{color:#D97706;font-weight:600}
.msg-bubble .status-err{color:#DC2626;font-weight:600}
.msg-bubble ul{padding-left:18px;margin:6px 0}
.msg-bubble li{margin-bottom:4px;font-size:.85rem}
.msg-bubble code{background:var(--ice);padding:2px 6px;border-radius:4px;font-size:.82rem;font-family:'Courier New',monospace}
.msg-bubble pre{background:var(--navy);color:#93C5FD;padding:14px;border-radius:8px;overflow-x:auto;font-size:.8rem;line-height:1.5;margin:10px 0;font-family:'Courier New',monospace}

.typing{display:flex;gap:4px;padding:14px 18px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--slate);opacity:.4;animation:typeDot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

.chat-input-area{padding:16px 24px;background:var(--white);border-top:1px solid var(--border)}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0}
.quick-btn{padding:9px 16px;border:1px solid var(--border);border-radius:100px;background:var(--white);cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text);transition:all .2s;font-family:'Pretendard Variable',Pretendard,sans-serif}
.quick-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--ice)}
.quick-btn:disabled{opacity:.4;cursor:default;pointer-events:none}

.welcome{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.welcome-inner{max-width:400px}
.welcome-icon{font-size:3rem;margin-bottom:16px}
.welcome h2{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:800;font-size:1.5rem;color:var(--navy);margin-bottom:8px}
.welcome p{font-size:.9rem;color:var(--slate);line-height:1.6}

@media(max-width:768px){
  .sidebar{display:none;position:fixed;inset:0;z-index:50;width:100%}
  .sidebar.open{display:flex}
  .mobile-toggle{display:flex!important}
}
.mobile-toggle{display:none;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-size:.8rem;font-weight:600;color:var(--text)}

.chat-input-row{display:flex;gap:8px;margin-top:12px}
.chat-text-input{flex:1;padding:11px 16px;border:1px solid var(--border);border-radius:100px;font-size:.9rem;font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s}
.chat-text-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,200,0.1)}
.chat-text-input::placeholder{color:var(--slate)}
.chat-send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--blue);color:#fff;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chat-send-btn:hover{background:var(--blue2);transform:scale(1.05)}
.chat-send-btn:disabled{opacity:.4;cursor:default;transform:none}

.data-panel{display:none;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;animation:msgIn .3s ease}
.data-panel.open{display:block}
.data-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.data-panel-header h3{font-family:'SUIT Variable',SUIT,sans-serif;font-weight:700;font-size:.95rem;color:var(--navy)}
.data-panel-close{background:none;border:none;font-size:1.2rem;color:var(--slate);cursor:pointer}
.data-panel-close:hover{color:var(--text)}
.data-field{margin-bottom:12px}
.data-field label{display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:4px}
.data-field .field-hint{font-size:.7rem;color:var(--slate);margin-bottom:4px;display:block}
.data-field input,.data-field textarea,.data-field select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;resize:vertical}
.data-field input:focus,.data-field textarea:focus,.data-field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,200,0.08)}
.data-field textarea{min-height:80px;max-height:200px;line-height:1.5}
.data-field .char-count{font-size:.65rem;color:var(--slate);text-align:right;margin-top:2px}
.data-field .char-count.over{color:#DC2626}
.data-submit{width:100%;padding:10px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-weight:600;font-size:.85rem;cursor:pointer;font-family:'Pretendard Variable',Pretendard,sans-serif;transition:all .2s}
.data-submit:hover{background:var(--blue2)}
.data-submit:disabled{opacity:.4;cursor:default}
.data-toggle{padding:7px 14px;border:1px dashed rgba(26,86,200,0.3);border-radius:8px;background:rgba(26,86,200,0.04);color:var(--blue);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Pretendard Variable',Pretendard,sans-serif;display:inline-flex;align-items:center;gap:6px}
.data-toggle:hover{background:rgba(26,86,200,0.08);border-color:var(--blue)}

.file-upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.file-upload-zone:hover,.file-upload-zone.dragover{border-color:var(--blue);background:rgba(26,86,200,0.04)}
.file-upload-zone input{display:none}
.file-upload-icon{font-size:1.6rem;margin-bottom:6px}
.file-upload-text{font-size:.82rem;color:var(--text2);line-height:1.5}
.file-upload-text strong{color:var(--blue);font-weight:600}
.file-upload-hint{font-size:.7rem;color:var(--slate);margin-top:4px}
.file-preview{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--ice);border-radius:8px;margin-top:8px;font-size:.82rem;color:var(--text)}
.file-preview-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-preview-size{font-size:.72rem;color:var(--slate);flex-shrink:0}
.file-preview-remove{background:none;border:none;color:var(--slate);cursor:pointer;font-size:1rem;padding:0 4px}
.file-preview-remove:hover{color:#DC2626}
.file-content-preview{margin-top:8px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:.78rem;color:var(--text2);max-height:120px;overflow-y:auto;line-height:1.5;font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-all}
.step-flow{display:flex;align-items:center;gap:0;margin:12px 0;flex-wrap:wrap}
.step-flow-item{font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--bg2);color:var(--slate);transition:all .2s}
.step-flow-item.done{background:rgba(5,150,105,0.1);color:var(--green)}
.step-flow-item.active{background:rgba(26,86,200,0.1);color:var(--blue)}
.step-flow-item.waiting{background:rgba(217,119,6,0.1);color:#D97706}
.step-flow-arrow{font-size:.6rem;color:var(--border);padding:0 3px}
.status-badge{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px}
.badge-draft{background:var(--ice);color:var(--blue)}
.badge-review{background:rgba(217,119,6,0.1);color:#D97706}
.badge-approved{background:rgba(5,150,105,0.1);color:var(--green)}
.badge-completed{background:rgba(5,150,105,0.15);color:var(--green)}
.sys-tag{display:inline-block;font-size:.62rem;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(26,86,200,0.06);color:var(--blue);margin-right:4px;margin-bottom:2px}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <img src="agentgo-logo.png" alt="AgentGo" style="width:24px;height:24px;object-fit:contain">
    AgentGo
  </a>
  <span class="topbar-divider"></span>
  <span class="topbar-title">AgentGo 체험</span>
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">시나리오 선택</button>
  <a href="index.html" class="topbar-back">← 메인으로 돌아가기</a>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>업무를 선택하세요</h2>
      <p>2분 안에 AgentGo를 체험할 수 있습니다</p>
    </div>
    <div class="scenario-list">
      <button class="scenario-btn" data-scenario="automation" onclick="loadScenario('automation')">
        <span class="scenario-icon">⚡</span>
        <h3>업무 비서 Agent</h3>
        <p>보고서 작성 · 메일·결재 자동화 · 반복 업무 지원</p>
        <div class="scenario-modules"><span class="scenario-mod">Flow</span><span class="scenario-mod">Workflow</span><span class="scenario-mod">Guard</span></div>
      </button>
      <button class="scenario-btn" data-scenario="knowledge" onclick="loadScenario('knowledge')">
        <span class="scenario-icon">🔍</span>
        <h3>사내 지식 Agent</h3>
        <p>사내 문서 검색 · 정책 확인 · 지식 활용</p>
        <div class="scenario-modules"><span class="scenario-mod">Platform</span><span class="scenario-mod">DB</span><span class="scenario-mod">Guard</span></div>
      </button>
      <button class="scenario-btn" data-scenario="dev" onclick="loadScenario('dev')">
        <span class="scenario-icon">💻</span>
        <h3>개발 Copilot Agent</h3>
        <p>코드 생성 · 품질 검토 · 테스트 지원</p>
        <div class="scenario-modules"><span class="scenario-mod">Coder</span><span class="scenario-mod">Guard</span><span class="scenario-mod">Workflow</span></div>
      </button>
      <button class="scenario-btn" data-scenario="ops" onclick="loadScenario('ops')">
        <span class="scenario-icon">📊</span>
        <h3>운영 관제 Agent</h3>
        <p>운영 모니터링 · 사용량 분석 · 이상 대응</p>
        <div class="scenario-modules"><span class="scenario-mod">Management</span><span class="scenario-mod">Guard</span><span class="scenario-mod">Workflow</span></div>
      </button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-inner">
        <div class="welcome-icon">🤖</div>
        <h2>2분 안에 AgentGo 체험하기</h2>
        <p>아래 업무 중 하나를 선택하면<br>샘플 데이터 기반으로 Agent 동작을 바로 확인할 수 있습니다.</p>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;max-width:280px;margin-left:auto;margin-right:auto">
          <button class="scenario-btn" onclick="loadScenario('automation')" style="text-align:center;padding:14px"><h3 style="margin:0;font-size:.95rem">⚡ 보고서 자동 작성</h3></button>
          <button class="scenario-btn" onclick="loadScenario('knowledge')" style="text-align:center;padding:14px"><h3 style="margin:0;font-size:.95rem">🔍 사내 문서 검색</h3></button>
          <button class="scenario-btn" onclick="loadScenario('dev')" style="text-align:center;padding:14px"><h3 style="margin:0;font-size:.95rem">💻 개발 지원</h3></button>
          <button class="scenario-btn" onclick="loadScenario('ops')" style="text-align:center;padding:14px"><h3 style="margin:0;font-size:.95rem">📊 운영 분석</h3></button>
        </div>
      </div>
    </div>
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="chat-agent-icon" id="chatAgentIcon">A</div>
      <div class="chat-agent-info">
        <h3 id="chatAgentName">Agent</h3>
        <p>● 온라인</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages" style="display:none"></div>
    <div class="chat-input-area" id="chatInput" style="display:none">
      <div class="data-panel" id="dataPanel"></div>
      <div class="quick-actions" id="quickActions"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <button class="data-toggle" id="dataToggle" onclick="toggleDataPanel()" style="display:none">📋 내 업무로 테스트하기</button>
      </div>
      <div class="chat-input-row">
        <input type="text" class="chat-text-input" id="chatTextInput" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter')sendUserInput()">
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendUserInput()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
var SCENARIOS={
  automation:{
    name:'업무 비서 Agent',icon:'⚡',short:'비서',
    greeting:'AgentGo 업무 비서 Agent입니다.<br>요청 → 초안 생성 → 담당자 검토 → 승인 → 실행 순서로 진행됩니다.<br>아래 업무를 선택하세요.',
    actions:[
      {label:'📋 주간 보고서 생성',key:'report'},
      {label:'✉️ 미팅 후속 메일',key:'email'},
      {label:'✅ 결재 요청',key:'approval'}
    ],
    flows:{
      report:[
        {from:'user',text:'이번 주 팀 주간 보고서를 작성해 줘.'},
        {from:'bot',html:'연동 시스템에서 데이터를 수집합니다.<br>Jira 완료 태스크 12건, Confluence 문서 5건, Teams 논의 3건'},
        {from:'bot',html:'<strong>📝 주간 보고서 초안</strong> <span class="status-badge badge-draft">Draft</span><br><br><strong>1. 완료</strong><ul><li>랜딩 페이지 v2.1 배포</li><li>A/B 테스트 분석 완료</li><li>도메인 맞춤 소개서 작성</li></ul><strong>2. 진행 중</strong><ul><li>Q3 웨비나 기획 (60%)</li><li>고객사 인터뷰 조율</li></ul><strong>3. 계획</strong><ul><li>발표자료 제작</li><li>콘텐츠 3건 발행</li></ul><br>🛡️ Guard: 기밀 정보 포함 여부 검사 완료 — 이상 없음<br><br>⚠️ <strong>담당자 검토가 필요합니다.</strong> 초안을 확인하고 승인해 주세요.','actions':[{label:'✅ 승인 — 전송',key:'report_send'},{label:'📎 승인 — 저장',key:'report_save'},{label:'✏️ 수정 요청',key:'report_edit'}]},
      ],
      report_send:[
        {from:'user',text:'승인합니다. 팀장에게 전송해 주세요.'},
        {from:'bot',html:'<strong>✅ 이메일 전송 완료</strong> <span class="status-badge badge-completed">Completed</span><br><br>수신: 김팀장 (kim.lead@company.com)<br>제목: [마케팅팀] 주간 보고서 — 6월 3주차<br><br>📋 감사 로그: 승인자·시각·수신자 기록 완료'}
      ],
      report_save:[
        {from:'user',text:'승인합니다. Confluence에 저장해 주세요.'},
        {from:'bot',html:'<strong>✅ Confluence 저장 완료</strong> <span class="status-badge badge-completed">Completed</span><br><br>페이지: 마케팅팀 > 주간보고 > 2026-06-3주차<br><br>📋 감사 로그: 저장 이력 기록 완료'}
      ],

var currentScenario=null,isTyping=false;

function loadScenario(key){
  var s=SCENARIOS[key];
  currentScenario=key;
  document.querySelectorAll('.scenario-btn').forEach(function(b){b.classList.toggle('active',b.dataset.scenario===key)});
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('chatHeader').style.display='flex';
  document.getElementById('chatMessages').style.display='flex';
  document.getElementById('chatInput').style.display='block';
  document.getElementById('chatAgentIcon').textContent=s.short;
  document.getElementById('chatAgentName').textContent=s.name;
  var msgs=document.getElementById('chatMessages');
  msgs.innerHTML='';
  addBotMsg(s.greeting,s.actions);
  var dt=document.getElementById('dataToggle');
  dt.style.display=DATA_FORMS[key]?'inline-flex':'none';
  document.getElementById('dataPanel').classList.remove('open');
  document.querySelector('.sidebar').classList.remove('open');
}

function addBotMsg(text,actions){
  var msgs=document.getElementById('chatMessages');
  var d=document.createElement('div');d.className='msg msg-bot';
  var lbl=document.createElement('div');lbl.className='msg-label';lbl.textContent=SCENARIOS[currentScenario].name;
  var bub=document.createElement('div');bub.className='msg-bubble';
  bub.innerHTML=text.replace(/\n/g,'<br>');
  d.appendChild(lbl);d.appendChild(bub);msgs.appendChild(d);
  if(actions)setActions(actions);
  msgs.scrollTop=msgs.scrollHeight;
}

function addBotMsgHtml(html,actions){
  var msgs=document.getElementById('chatMessages');
  var d=document.createElement('div');d.className='msg msg-bot';
  var lbl=document.createElement('div');lbl.className='msg-label';lbl.textContent=SCENARIOS[currentScenario].name;
  var bub=document.createElement('div');bub.className='msg-bubble';
  bub.innerHTML=html;
  d.appendChild(lbl);d.appendChild(bub);msgs.appendChild(d);
  if(actions)setActions(actions);
  msgs.scrollTop=msgs.scrollHeight;
}

function addUserMsg(text){
  var msgs=document.getElementById('chatMessages');
  var d=document.createElement('div');d.className='msg msg-user';
  var lbl=document.createElement('div');lbl.className='msg-label';lbl.textContent='나';
  var bub=document.createElement('div');bub.className='msg-bubble';
  bub.textContent=text;
  d.appendChild(lbl);d.appendChild(bub);msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  var msgs=document.getElementById('chatMessages');
  var t=document.createElement('div');t.className='typing';t.id='typingIndicator';
  t.innerHTML='<span></span><span></span><span></span>';
  msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){var t=document.getElementById('typingIndicator');if(t)t.remove()}

function setActions(actions){
  var qa=document.getElementById('quickActions');
  qa.innerHTML='';
  actions.forEach(function(a){
    var btn=document.createElement('button');
    btn.className='quick-btn';btn.textContent=a.label;
    btn.onclick=function(){runFlow(a.key)};
    qa.appendChild(btn);
  });
}
function disableActions(){
  document.querySelectorAll('.quick-btn').forEach(function(b){b.disabled=true});
}

function runFlow(key){
  if(isTyping)return;
  var s=SCENARIOS[currentScenario];
  var flow=s.flows[key];
  if(!flow)return;
  isTyping=true;
  disableActions();
  var i=0;
  function next(){
    if(i>=flow.length){isTyping=false;return}
    var step=flow[i];i++;
    if(step.from==='user'){
      addUserMsg(step.text);
      setTimeout(function(){showTyping();setTimeout(next,800+Math.random()*600)},300);
    } else {
      hideTyping();
      if(step.html){addBotMsgHtml(step.html,step.actions)}
      else{addBotMsg(step.text,step.actions)}
      if(i<flow.length && flow[i].from==='bot'){
        setTimeout(function(){showTyping();setTimeout(next,1000+Math.random()*500)},400);
      } else {
        setTimeout(next,300);
      }
    }
  }
  next();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toggleDataPanel(){
  var panel=document.getElementById('dataPanel');
  if(panel.classList.contains('open')){panel.classList.remove('open');return}

  var html='<div class="data-panel-header"><h3>📋 '+form.title+'</h3><button class="data-panel-close" onclick="toggleDataPanel()">&times;</button></div>';

    html+='<div class="data-field">';
    html+='<label for="'+f.id+'">'+f.label+(f.required?' <span style="color:#DC2626">*</span>':'')+'</label>';
    if(f.hint)html+='<span class="field-hint">'+f.hint+'</span>';

      html+='<div class="file-upload-zone" id="'+f.id+'_zone" onclick="document.getElementById(\''+f.id+'\').click()" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="event.preventDefault();this.classList.remove(\'dragover\');handleFileDrop(event,\''+f.id+'\',\''+f.accept+'\','+(f.maxsize||512000)+')">';
      html+='<input type="file" id="'+f.id+'" accept="'+(f.accept||'')+'" onchange="handleFileSelect(this,\''+f.id+'\','+(f.maxsize||512000)+')">';
      html+='<div class="file-upload-icon">📎</div>';
      html+='<div class="file-upload-text"><strong>클릭하여 파일 선택</strong> 또는 드래그 앤 드롭</div>';
      html+='<div class="file-upload-hint">'+(f.accept||'')+' · 최대 '+(f.maxsize>=1048576?Math.round(f.maxsize/1048576)+'MB':Math.round(f.maxsize/1024)+'KB')+'</div>';
      html+='</div>';
      html+='<div id="'+f.id+'_preview" style="display:none"></div>';
    }
    else if(f.type==='text')html+='<input type="text" id="'+f.id+'" placeholder="'+(f.placeholder||'')+'" maxlength="'+(f.maxlen||50)+'"'+(f.required?' required':'')+'>';
    else if(f.type==='textarea')html+='<textarea id="'+f.id+'" placeholder="'+(f.placeholder||'')+'" maxlength="'+(f.maxlen||300)+'"'+(f.required?' required':'')+' oninput="updateCharCount(this,'+(f.maxlen||300)+')"'+(f.mono?' style="font-family:Courier New,monospace;font-size:.82rem"':'')+'></textarea><div class="char-count" id="'+f.id+'_cc">0/'+(f.maxlen||300)+'</div>';

function updateCharCount(el,max){
  var cc=document.getElementById(el.id+'_cc');
  if(!cc)return;
  cc.textContent=el.value.length+'/'+max;
  cc.className='char-count'+(el.value.length>max?' over':'');
}

var uploadedFiles={};

function handleFileSelect(input,fieldId,maxsize){
  var file=input.files[0];
  if(!file)return;
  processFile(file,fieldId,maxsize);
}

function handleFileDrop(e,fieldId,accept,maxsize){
  var file=e.dataTransfer.files[0];
  if(!file)return;
  var exts=accept.split(',').map(function(s){return s.trim().toLowerCase()});
  var ext='.'+file.name.split('.').pop().toLowerCase();
  if(exts.indexOf(ext)===-1){alert('지원하지 않는 파일 형식입니다.\n허용: '+accept);return}
  processFile(file,fieldId,maxsize);
}

function processFile(file,fieldId,maxsize){
  if(file.size>maxsize){alert('파일 크기가 '+Math.round(maxsize/1024)+'KB를 초과합니다.\n현재: '+Math.round(file.size/1024)+'KB');return}
  var preview=document.getElementById(fieldId+'_preview');
  var zone=document.getElementById(fieldId+'_zone');
  var reader=new FileReader();
  reader.onload=function(e){
    var content=e.target.result;
    var maxChars=3000;
    if(content.length>maxChars)content=content.substring(0,maxChars);
    uploadedFiles[fieldId]={name:file.name,size:file.size,content:content};
    zone.style.display='none';
    var sizeStr=file.size>=1024?Math.round(file.size/1024)+'KB':file.size+'B';
    preview.style.display='block';
    preview.innerHTML='<div class="file-preview"><span style="font-size:1.1rem">📄</span><span class="file-preview-name">'+esc(file.name)+'</span><span class="file-preview-size">'+sizeStr+'</span><button class="file-preview-remove" onclick="removeFile(\''+fieldId+'\')" title="파일 제거">&times;</button></div>'
      +'<div class="file-content-preview">'+esc(content.substring(0,500))+(content.length>500?'\n...(이하 생략)':'')+'</div>';
    autoFillFromFile(fieldId,content);
  };
  reader.readAsText(file,'UTF-8');
}

function removeFile(fieldId){
  delete uploadedFiles[fieldId];
  var preview=document.getElementById(fieldId+'_preview');
  var zone=document.getElementById(fieldId+'_zone');
  if(preview)preview.style.display='none';
  if(zone)zone.style.display='';
  var input=document.getElementById(fieldId);
  if(input)input.value='';
}

function autoFillFromFile(fieldId,content){
  var lines=content.split('\n').filter(function(s){return s.trim()});
  if(fieldId==='a_file'){
    var ta=document.getElementById('a_tasks');
    if(ta&&!ta.value.trim()){ta.value=lines.slice(0,5).join('\n');updateCharCount(ta,300)}
  }
  else if(fieldId==='k_file'){
    var ta=document.getElementById('k_content');
    if(ta&&!ta.value.trim()){ta.value=lines.slice(0,10).join('\n');updateCharCount(ta,500)}
    var title=document.getElementById('k_title');
    if(title&&!title.value.trim()){
      var fname=uploadedFiles[fieldId].name.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ');
      title.value=fname.substring(0,30);
    }
  }
  else if(fieldId==='d_file'){
    var ta=document.getElementById('d_code');
    if(ta&&!ta.value.trim()){ta.value=lines.slice(0,30).join('\n');updateCharCount(ta,800)}
    var ext=uploadedFiles[fieldId].name.split('.').pop().toLowerCase();
    var langMap={py:'Python',js:'JavaScript',ts:'TypeScript',java:'Java',go:'Go'};
    if(langMap[ext]){var sel=document.getElementById('d_lang');if(sel){sel.value=langMap[ext]}}
  }
  else if(fieldId==='o_file'){
    var ta=document.getElementById('o_logs');
    if(ta&&!ta.value.trim()){ta.value=lines.slice(0,15).join('\n');updateCharCount(ta,600)}
  }
}

function submitDataForm(){
  if(isTyping||!currentScenario)return;
  var form=DATA_FORMS[currentScenario];
  if(!form)return;
  var data={};
  var valid=true;
  form.fields.forEach(function(f){
    var el=document.getElementById(f.id);
    if(!el)return;
    var v=el.value.trim();
    if(f.required&&!v){el.style.borderColor='#DC2626';valid=false}
    else{el.style.borderColor=''}
    if(f.maxlen&&v.length>f.maxlen){v=v.substring(0,f.maxlen)}
    data[f.id]=v;
  });
  if(!valid)return;
  document.getElementById('dataPanel').classList.remove('open');
  var steps=form.generate(data);
  addUserMsg('내 데이터로 '+form.title+' 실행');
  isTyping=true;disableActions();
  var i=0;
  function next(){
    if(i>=steps.length){isTyping=false;return}
    var step=steps[i];i++;
    showTyping();
    setTimeout(function(){
      hideTyping();
      if(step.html)addBotMsgHtml(step.html,step.actions);
      else addBotMsg(step.text,step.actions);
      if(i<steps.length)setTimeout(next,600);
      else{isTyping=false}
    },800+Math.random()*500);
  }
  setTimeout(next,400);
}

function sendUserInput(){
  if(isTyping||!currentScenario)return;
  var input=document.getElementById('chatTextInput');
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  addUserMsg(text);
  isTyping=true;
  disableActions();
  showTyping();

  var lower=text.toLowerCase();
  var responses=FREE_RESPONSES[currentScenario]||[];
  var matched=null;
  for(var i=0;i<responses.length;i++){
    var r=responses[i];
    for(var j=0;j<r.keywords.length;j++){
      if(lower.indexOf(r.keywords[j])!==-1){matched=r;break}
    }
    if(matched)break;
  }

  setTimeout(function(){
    hideTyping();
    if(matched&&matched.flow){
      addBotMsg(matched.response);
      setTimeout(function(){isTyping=false;runFlow(matched.flow)},600);
    } else if(matched){
      if(matched.response.indexOf('<')!==-1){addBotMsgHtml(matched.response)}
      else{addBotMsg(matched.response)}
      isTyping=false;
      var s=SCENARIOS[currentScenario];
      setActions(s.actions);
    } else {
      addBotMsg('입력하신 내용을 분석했습니다. 현재 체험 버전에서는 아래 시나리오를 통해 AgentGo의 주요 기능을 경험하실 수 있습니다.\n\n아래 버튼을 클릭해 주세요!');
      isTyping=false;
      var s=SCENARIOS[currentScenario];
      setActions(s.actions);
    }
  },1000+Math.random()*500);
}
